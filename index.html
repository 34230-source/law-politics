<title>LAW AND POLITICS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;

overflow:hidden;

font-family:Arial,"Noto Sans Thai",sans-serif;

background:

radial-gradient(
circle at center,
rgba(255,255,255,.35),
transparent 18%
),

linear-gradient(
120deg,
#10001f,
#3b0764,
#6b21a8,
#140021
);

color:white;

}




/* แสงกลาง */

body:before{

content:"";

position:absolute;

width:600px;
height:600px;

left:45%;
top:50%;

transform:translate(-50%,-50%);

background:white;

opacity:.12;

filter:blur(130px);

}




/* ควัน */

body:after{

content:"";

position:absolute;

bottom:-80px;

left:-80px;

width:450px;

height:250px;

background:

radial-gradient(
circle,
rgba(255,255,255,.25),
transparent 70%
);

filter:blur(50px);

}



.banner{

height:100vh;

display:grid;

grid-template-columns:60% 40%;

position:relative;

z-index:2;

}





/* LEFT */

.left{

padding-left:90px;

display:flex;

flex-direction:column;

justify-content:center;

}



.main-title{

font-size:105px;

font-weight:900;

letter-spacing:6px;

line-height:.85;

text-shadow:

0 0 25px rgba(255,255,255,.25);

}



.main-title span{

color:#f8fafc;

}




.smile{

position:relative;

display:inline-block;

}



.smile:before,
.smile:after{

content:"";

position:absolute;

background:white;

width:10px;

height:10px;

border-radius:50%;

top:38px;

}


.smile:before{

left:28px;

}


.smile:after{

right:28px;

}


.smile i{

position:absolute;

width:45px;

height:20px;

border-bottom:5px solid white;

border-radius:50%;

left:15px;

bottom:25px;

}




.line{

width:280px;

height:3px;

background:#d4af37;

margin:40px 0;

}



.detail{

font-size:24px;

line-height:1.8;

}



.detail strong{

font-size:36px;

}




/* RIGHT */


.right{

position:relative;

border-left:

1px solid rgba(212,175,55,.4);

}




.logos{

position:absolute;

right:45px;

top:45px;

display:flex;

gap:15px;

}



.logo{

width:75px;

height:75px;

border-radius:50%;

border:3px solid #d4af37;

background:rgba(255,255,255,.15);

display:flex;

align-items:center;

justify-content:center;

color:#ffd166;

font-size:12px;

}





/* ครู */


.teachers{

height:100%;

display:flex;

align-items:center;

justify-content:center;

}



.teacher{

height:620px;

filter:

drop-shadow(0 0 35px rgba(0,0,0,.8));

margin-left:-80px;

}





/* social */


.social{

position:absolute;

bottom:50px;

right:50px;

}



.small{

color:#ccc;

font-size:14px;

}



.social a{

display:flex;

align-items:center;

gap:15px;

background:white;

color:#333;

padding:12px 25px;

border-radius:18px;

margin-top:8px;

text-decoration:none;

font-weight:bold;

}




.ig{

width:42px;

height:42px;

border-radius:12px;

background:

linear-gradient(
135deg,
#ffd600,
#ff7a00,
#e1306c,
#833ab4
);

}



.fb{

width:42px;

height:42px;

border-radius:50%;

background:#1877f2;

color:white;

font-size:32px;

display:flex;

justify-content:center;

align-items:center;

font-weight:bold;

}
