<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เว็บไซต์ของกิม</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8e8ff;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 15px #ddd;
    }

    h1 {
      color: #9b59b6;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    button {
      background: #9b59b6;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>ยินดีต้อนรับสู่เว็บไซต์ของกิม</h1>
  <p>เว็บไซต์นี้กำลังสร้างอยู่ ✨</p>
  <p>สร้างด้วย GitHub Pages</p>

  <button>กดดูเพิ่มเติม</button>
</div>

</body>
</html>
