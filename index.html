<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LAW AND POLITICS CLASSROOM</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    height:100vh;

    overflow:hidden;

    font-family:"Arial",sans-serif;

    color:white;


    background:

    radial-gradient(
    circle at 50% 40%,
    rgba(255,255,255,.35),
    transparent 18%
    ),

    linear-gradient(
    135deg,
    #12001f,
    #3c096c,
    #240046,
    #0b0014
    );

}


/* แสงกลาง */

body::before{

content:"";

position:absolute;

width:650px;
height:650px;

left:50%;
top:45%;

transform:translate(-50%,-50%);

background:white;

opacity:.12;

filter:blur(120px);

}



/* ควัน */

body::after{

content:"";

position:absolute;

bottom:-120px;
left:-100px;

width:450px;
height:300px;

background:

radial-gradient(
circle,
rgba(255,255,255,.25),
transparent 70%
);

filter:blur(60px);

}




.banner{

height:100vh;

display:grid;

grid-template-columns:60% 40%;

position:relative;

z-index:2;

}



/* ฝั่งซ้าย */

.left{

padding-left:90px;

display:flex;

justify-content:center;

flex-direction:column;

}



.title{

font-size:90px;

font-weight:900;

line-height:.85;

letter-spacing:8px;


background:

linear-gradient(
180deg,
white,
#ffd166
);


-webkit-background-clip:text;

color:transparent;

filter:drop-shadow(0 0 20px #ffd166);

}




/* เส้นทอง */

.gold-line{

width:300px;

height:3px;

background:#d4af37;

margin:35px 0;

}




.detail{

font-size:22px;

line-height:1.8;

}



.detail strong{

font-size:34px;

}




/* ฝั่งขวา */

.right{

border-left:1px solid rgba(255,215,0,.3);

position:relative;

}




/* โลโก้ */

.logos{

position:absolute;

right:35px;

top:35px;

display:flex;

gap:12px;

}


.logo{

width:70px;

height:70px;

border-radius:50%;

border:3px solid #d4af37;

display:flex;

justify-content:center;

align-items:center;

font-size:11px;

color:#ffd166;

background:rgba(255,255,255,.12);

}





/* รูปครู */

.teacher-area{

height:75%;

display:flex;

justify-content:center;

align-items:center;

gap:0;

}



.teacher{

width:250px;

height:500px;

object-fit:cover;

margin-left:-50px;

filter:

drop-shadow(0 0 30px black);

}





/* Social */


.social{

position:absolute;

right:35px;

bottom:40px;

}



.social small{

color:#ccc;

}



.social a{

display:flex;

align-items:center;

gap:15px;

width:260px;

background:white;

color:#333;

padding:12px 20px;

border-radius:18px;

margin-top:8px;

text-decoration:none;

font-weight:bold;

}





.ig{

width:40px;

height:40px;

border-radius:12px;


background:

linear-gradient(
135deg,
#ffd600,
#ff7a00,
#e1306c,
#833ab4
);

}



.fb{

width:40px;

height:40px;

border-radius:50%;

background:#1877f2;

color:white;

font-size:30px;

display:flex;

justify-content:center;

align-items:center;

font-weight:bold;

}



</style>

</head>



<body>



<div class="banner">



<div class="left">


<div class="title">

LAW<br>

AND<br>

POLITICS

</div>



<div class="gold-line"></div>



<div class="detail">

<br>


<strong>

</div>

<div class="logos">

<div class="logo">LP</div>

</div>

</div>
